<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Battlefleet Gothic</title>
<style>
:root{--bg:#0a0a0f;--card:#12121a;--inp:#1a1a25;--gold:#c9a227;--gdim:#8a7019;--txt:#e0e0e0;--dim:#888;--red:#d94a4a;--green:#4ad97a;--purple:#7a4ad9;--pdim:#5a35a0;--orange:#d97a1a;--teal:#1a9a8a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5;}
nav{display:flex;align-items:center;background:var(--card);border-bottom:2px solid var(--gdim);position:sticky;top:0;z-index:200;height:52px;}
.logo{padding:0 1rem;color:var(--gold);font-weight:bold;font-size:.95rem;border-right:1px solid var(--gdim);height:100%;display:flex;align-items:center;white-space:nowrap;}
.nav-links{display:flex;height:100%;}
.nb{display:flex;align-items:center;padding:0 .9rem;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--dim);font-size:.88rem;cursor:pointer;height:100%;white-space:nowrap;text-decoration:none;transition:all .15s;}
.nb:hover{color:var(--txt);}.nb.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--inp);}
.page{display:none;}.page.active{display:block;}
.fleet-bar{background:var(--card);border-bottom:1px solid var(--gdim);display:flex;align-items:center;position:sticky;top:52px;z-index:190;height:38px;}
.ftabs{display:flex;align-items:center;flex:1;overflow-x:auto;scrollbar-width:none;height:100%;}
.ftabs::-webkit-scrollbar{display:none;}
.ftab{display:flex;align-items:center;gap:.3rem;padding:0 .8rem;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--dim);cursor:pointer;white-space:nowrap;font-size:.82rem;height:100%;transition:all .15s;}
.ftab.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--inp);}
.ftab .tp{font-size:.68rem;}.ftab .tp.over{color:var(--red);}
.ftab .td{opacity:0;font-size:.68rem;color:var(--red);pointer-events:none;}
.ftab:hover .td{opacity:1;pointer-events:all;}
.fadd{padding:0 .8rem;border:none;background:transparent;color:var(--gdim);cursor:pointer;font-size:1.2rem;height:100%;transition:color .15s;}
.fadd:hover{color:var(--gold);}
.pbar{background:linear-gradient(135deg,var(--card),#1a1a2a);padding:.52rem 1rem;display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gdim);position:sticky;top:90px;z-index:180;}
.pbar label{font-size:.78rem;color:var(--dim);}
.pbar input[type=number]{width:68px;padding:.28rem .4rem;background:var(--inp);border:1px solid var(--gdim);color:var(--txt);border-radius:4px;font-size:.82rem;}
.pbar input[type=text]{padding:.25rem .45rem;background:var(--inp);border:1px solid var(--gdim);color:var(--txt);border-radius:4px;font-size:.82rem;width:140px;}
.pnum{font-size:1.2rem;font-weight:bold;color:var(--gold);}.pnum.over{color:var(--red)!important;}
.warnbar{padding:.38rem 1rem;font-size:.8rem;display:none;background:#2a1a0a;border-bottom:1px solid #b87a1a;color:#e8a040;}
.warnbar.show{display:block;}
.wrap{max-width:1100px;margin:0 auto;padding:1rem;}
.card{background:var(--card);border:1px solid var(--gdim);border-radius:8px;padding:1.1rem;margin-bottom:1rem;}
.card h2{color:var(--gold);margin-bottom:.75rem;font-size:1.02rem;}
.card.purple{border-color:var(--pdim);}.card.purple h2{color:#a07aee;}
.fg{margin-bottom:.72rem;}.fg label{display:block;margin-bottom:.25rem;color:var(--dim);font-size:.77rem;}
.fg input,.fg textarea,.fg select{width:100%;padding:.55rem .65rem;background:var(--inp);border:1px solid #333;color:var(--txt);border-radius:4px;font-size:.87rem;}
.fg textarea{min-height:80px;resize:vertical;font-family:inherit;}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--gold);}
.frow{display:flex;gap:.52rem;flex-wrap:wrap;}.frow .fg{flex:1;min-width:88px;}
.btn{padding:.5rem .9rem;border:none;border-radius:4px;cursor:pointer;font-size:.84rem;transition:all .15s;display:inline-flex;align-items:center;gap:.22rem;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.bg{background:var(--gold);color:#0a0a0f;font-weight:bold;}.bg:hover:not(:disabled){background:var(--gdim);}
.bd{background:var(--red);color:#fff;}.bd:hover:not(:disabled){background:#b83a3a;}
.bgh{background:var(--inp);color:var(--txt);border:1px solid var(--gdim);}.bgh:hover:not(:disabled){border-color:var(--gold);}
.bw{background:#b87a1a;color:#fff;}.bw:hover:not(:disabled){background:#9a6515;}
.bgr{background:var(--green);color:#0a0a0f;font-weight:bold;}.bgr:hover:not(:disabled){background:#35b560;}
.bp{background:var(--purple);color:#fff;}.bp:hover:not(:disabled){background:var(--pdim);}
.bsm{padding:.25rem .5rem;font-size:.74rem;}
.brow{display:flex;gap:.42rem;flex-wrap:wrap;}
.toggle-wrap{display:flex;align-items:center;gap:.4rem;padding:.52rem 1rem;background:var(--card);border-bottom:1px solid var(--gdim);font-size:.84rem;}
.tsw{position:relative;width:38px;height:20px;flex-shrink:0;}.tsw input{opacity:0;width:0;height:0;}
.tsl{position:absolute;cursor:pointer;inset:0;background:var(--inp);border-radius:20px;transition:.22s;}
.tsl:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:var(--dim);border-radius:50%;transition:.22s;}
.tsw input:checked+.tsl{background:var(--gdim);}.tsw input:checked+.tsl:before{transform:translateX(18px);background:var(--gold);}
.share-code{flex:1;min-width:130px;padding:.45rem .58rem;background:var(--inp);border:1px solid #333;color:var(--txt);border-radius:4px;font-size:.77rem;font-family:monospace;}
.share-code:focus{outline:none;border-color:var(--gold);}
.fe{display:flex;align-items:flex-start;gap:.58rem;padding:.58rem;background:var(--inp);border-radius:5px;margin-bottom:.32rem;}
.fe-thumb{width:40px;height:40px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.fe-info{flex:1;min-width:0;cursor:pointer;}
.fe-name{font-weight:bold;font-size:.87rem;}.fe-pts{font-size:.76rem;color:var(--gold);}
.fe-pts.purple{color:#a07aee;}
.fe-breakdown{font-size:.73rem;color:var(--dim);margin-top:.1rem;}
.fe-right{display:flex;flex-direction:column;align-items:flex-end;gap:.22rem;flex-shrink:0;}
.rm-btn{background:var(--red);color:#fff;border:none;width:23px;height:23px;border-radius:50%;cursor:pointer;display:none;font-size:.88rem;align-items:center;justify-content:center;line-height:1;}
.edit-on .rm-btn{display:flex;}
.wg-row{display:flex;align-items:center;gap:.28rem;font-size:.76rem;margin-top:.18rem;}
.wg-lbl{color:var(--dim);}.wg-pts-lbl{color:var(--gold);font-size:.71rem;}
.wqb{background:var(--card);border:1px solid var(--gdim);color:var(--txt);width:19px;height:19px;border-radius:3px;cursor:pointer;font-size:.78rem;display:none;align-items:center;justify-content:center;line-height:1;}
.edit-on .wqb{display:flex;}.wqn{min-width:14px;text-align:center;font-size:.76rem;}
/* VARIANT SELECT */
.var-select-row{display:flex;align-items:center;gap:.4rem;margin-top:.22rem;font-size:.78rem;flex-wrap:wrap;}
.var-select-row label{color:var(--dim);}
.var-select-row select{padding:.22rem .4rem;background:var(--card);border:1px solid var(--teal);color:#4ad9c9;border-radius:4px;font-size:.76rem;max-width:160px;}
.var-badge{background:#0f1a18;color:#4ad9c9;border:1px solid var(--teal);padding:.1rem .35rem;border-radius:3px;font-size:.7rem;font-weight:bold;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:.75rem;margin-top:.72rem;}
.sc{background:var(--card);border:1px solid var(--gdim);border-radius:7px;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.sc:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(201,162,39,.16);}
.sc.purple{border-color:var(--pdim);}
.sc img,.sc-img{width:100%;height:122px;object-fit:cover;background:var(--inp);display:block;}
.sc-body{padding:.75rem;}
.sc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.22rem;}
.sc-name{color:var(--gold);font-size:.88rem;font-weight:bold;cursor:pointer;}.sc-name:hover{text-decoration:underline;}.sc-name.purple{color:#a07aee;}
.badge{padding:.11rem .33rem;border-radius:3px;font-size:.71rem;font-weight:bold;}
.bg-b{background:var(--gold);color:#0a0a0f;}.bp-b{background:var(--purple);color:#fff;}
.sc-sub{color:var(--dim);font-size:.73rem;margin-bottom:.28rem;}
.sc-acts{display:flex;gap:.27rem;margin-top:.55rem;flex-wrap:wrap;}
.sc-acts .btn{flex:1;padding:.28rem;font-size:.73rem;min-width:44px;}
.filter-bar{display:flex;gap:.34rem;margin-bottom:.58rem;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{padding:.36rem .48rem;background:var(--inp);border:1px solid #333;color:var(--txt);border-radius:4px;font-size:.81rem;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;padding:1rem;overflow-y:auto;}
.modal-bg.open{display:flex;justify-content:center;align-items:flex-start;padding-top:1.8rem;}
.modal{background:var(--card);border:2px solid var(--gold);border-radius:8px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;}
.modal.purple{border-color:var(--purple);}.modal.sm{max-width:300px;}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;border-bottom:1px solid var(--gdim);}
.mhdr h2{color:var(--gold);font-size:.95rem;}.mhdr h2.purple{color:#a07aee;}
.mx{background:transparent;border:none;color:var(--txt);font-size:1.28rem;cursor:pointer;line-height:1;}
.mbody{padding:.9rem;}
.mtabs{display:flex;border-bottom:1px solid var(--gdim);margin-bottom:.75rem;}
.mtab{padding:.35rem .75rem;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--dim);cursor:pointer;font-size:.82rem;transition:all .15s;}
.mtab.active{color:var(--gold);border-bottom-color:var(--gold);}
.mstats{background:var(--inp);padding:.75rem;border-radius:4px;white-space:pre-wrap;font-size:.83rem;margin-bottom:.7rem;}
.wpn-entry{background:var(--inp);border-radius:4px;padding:.48rem .65rem;margin-bottom:.28rem;font-size:.8rem;}
.wpn-nm{font-weight:bold;color:var(--gold);margin-bottom:.12rem;}.wpn-desc{color:var(--dim);}
/* BATTLE */
.bc{background:var(--card);border:1px solid var(--gdim);border-radius:8px;margin-bottom:.75rem;overflow:hidden;}
.bc.destroyed{border-color:#7a1a1a;opacity:.65;}
.bc-head{display:flex;align-items:center;gap:.65rem;padding:.65rem 1rem;cursor:pointer;border-bottom:1px solid transparent;transition:background .15s;}
.bc-head:hover{background:var(--inp);}.bc-head.open{border-bottom-color:#1a1a28;}
.bc-img{width:46px;height:46px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.bc-info{flex:1;min-width:0;}.bc-name{font-weight:bold;font-size:.9rem;color:var(--gold);}.bc-sub{font-size:.74rem;color:var(--dim);}
.bc-body{padding:.8rem;display:none;}.bc-body.open{display:block;}
.hp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.28rem;font-size:.82rem;}
.hp-val{font-weight:bold;font-size:1rem;color:var(--green);}.hp-val.low{color:var(--orange);}.hp-val.crit{color:var(--red);}
.hp-track{background:#1a1a2a;border-radius:20px;height:8px;overflow:hidden;margin-bottom:.38rem;}
.hp-fill{height:100%;border-radius:20px;transition:width .28s,background .28s;background:var(--green);}
.hp-fill.low{background:var(--orange);}.hp-fill.crit{background:var(--red);}
.hp-ctrl{display:flex;gap:.35rem;align-items:center;flex-wrap:wrap;}
.hp-ctrl input{width:56px;padding:.25rem .38rem;background:var(--inp);border:1px solid #333;color:var(--txt);border-radius:4px;font-size:.85rem;text-align:center;}
.crit-tbl{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:.6rem;}
.crit-tbl thead{background:#0d0d15;}
.crit-tbl th{padding:.32rem .45rem;text-align:left;color:var(--gold);font-size:.69rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--gdim);}
.crit-tbl th:first-child,.crit-tbl th:nth-child(2){text-align:center;}
.crit-tbl td{padding:.3rem .45rem;border-bottom:1px solid #1a1a28;vertical-align:middle;}
.crit-tbl tr:nth-child(even) td{background:#0d0d16;}
.cr{text-align:center;font-weight:bold;color:var(--gold);width:30px;}.cd{text-align:center;color:var(--red);font-weight:bold;width:40px;}
.cc{display:flex;align-items:center;gap:.2rem;width:68px;}
.ccb{background:var(--inp);border:1px solid #333;color:var(--txt);width:19px;height:19px;border-radius:3px;cursor:pointer;font-size:.76rem;display:flex;align-items:center;justify-content:center;transition:border-color .12s;}
.ccb:hover{border-color:var(--gold);}.ccn{min-width:14px;text-align:center;font-size:.78rem;font-weight:bold;}
.fires{display:flex;gap:1px;flex-wrap:wrap;max-width:85px;}.fire{font-size:.78rem;line-height:1;}
.crit-nm{font-weight:bold;}
/* BATTLE FILTER */
.battle-filter{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.7rem;}
.battle-filter select{padding:.32rem .55rem;background:var(--inp);border:1px solid var(--gdim);color:var(--txt);border-radius:4px;font-size:.83rem;}
.toast{position:fixed;bottom:1.1rem;right:1.1rem;padding:.55rem .95rem;border-radius:6px;font-size:.83rem;font-weight:bold;background:var(--card);border:1px solid var(--gdim);color:var(--txt);z-index:999;display:none;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.toast.show{display:block;}
.empty{text-align:center;padding:1.8rem 1rem;color:var(--dim);}.empty-icon{font-size:1.75rem;margin-bottom:.42rem;}
.divider{border:none;border-top:1px solid var(--gdim);margin:.72rem 0;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}.pbar{flex-direction:column;align-items:flex-start;}.filter-bar{flex-direction:column;}.frow{flex-direction:column;}.logo{display:none;}.nb{padding:0 .55rem;font-size:.78rem;}}
</style>
</head>
<body>
<nav>
  <div class="logo">⚓ BFG</div>
  <div class="nav-links">
    <button class="nb active" id="nb-fleet">⚓ Fleet Builder</button>
    <button class="nb" id="nb-battle">⚔️ Csata</button>
    <a class="nb" href="BFG_Dev.html">🔧 Developer</a>
  </div>
</nav>
<div class="toast" id="toast"></div>

<!-- FLEET PAGE -->
<div class="page active" id="page-fleet">
  <div class="fleet-bar">
    <div class="ftabs" id="ftabs"></div>
    <button class="fadd" id="btn-add-fleet">＋</button>
  </div>
  <div class="pbar">
    <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;">
      <div><span class="pnum" id="pts-used">0</span><span style="color:var(--dim);"> / <span id="pts-limit">1500</span> pts</span></div>
      <div style="display:flex;align-items:center;gap:.32rem;"><label>Határ:</label><input type="number" id="pts-limit-inp" value="1500" min="0" step="100"></div>
    </div>
    <div style="display:flex;align-items:center;gap:.32rem;"><label>Flotta:</label><input type="text" id="fleet-name-inp" placeholder="Flotta neve..."></div>
  </div>
  <div class="warnbar" id="cmd-warn">⚠️ 750 pont felett legalább egy Commander szükséges!</div>
  <div class="wrap">
    <div class="card" style="padding:.9rem;">
      <div style="font-weight:bold;color:var(--gold);margin-bottom:.58rem;font-size:.95rem;">💾 Flotta Megosztása</div>
      <div class="brow" style="margin-bottom:.42rem;">
        <button class="btn bg bsm" id="btn-copy-code">📋 Kód másolása</button>
        <span id="copy-ok" style="font-size:.76rem;color:var(--green);display:none;">✅ Másolva!</span>
      </div>
      <div style="font-size:.77rem;color:var(--dim);margin-bottom:.32rem;">Betöltés kódból:</div>
      <div class="brow">
        <input type="text" class="share-code" id="import-code" placeholder="Illeszd be a kódot...">
        <button class="btn bgh bsm" id="btn-import-code">Betöltés</button>
      </div>
      <div id="import-fleet-status" style="font-size:.77rem;color:var(--dim);min-height:1em;margin-top:.3rem;"></div>
    </div>
    <div class="card" id="fleet-container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;">
        <span style="font-weight:bold;color:var(--gold);">⚔️ Hajók</span>
        <span style="color:var(--dim);font-size:.8rem;" id="fleet-count">0 hajó</span>
      </div>
      <div id="fleet-ships"></div>
    </div>
    <div class="card" id="cmd-container" style="border-color:var(--pdim);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;">
        <span style="font-weight:bold;color:#a07aee;">👑 Commanderek</span>
        <span style="color:var(--dim);font-size:.8rem;" id="cmd-count">0 commander</span>
      </div>
      <div id="fleet-cmds"></div>
    </div>
    <div class="toggle-wrap">
      <label class="tsw"><input type="checkbox" id="edit-toggle"><span class="tsl"></span></label>
      <span>Szerkesztő mód</span>
    </div>
    <div id="avail-section" style="display:none;margin-top:.9rem;">
      <div style="font-weight:bold;color:var(--gold);margin-bottom:.58rem;">📦 Elérhető Hajók</div>
      <div class="filter-bar">
        <select id="faction-filter"><option value="">Minden frakció</option></select>
        <select id="subfaction-filter"><option value="">Minden al-frakció</option></select>
        <select id="type-filter"><option value="">Minden típus</option></select>
        <input type="text" id="search-filter" placeholder="Keresés...">
      </div>
      <div class="grid" id="avail-ships"></div>
    </div>
    <div id="avail-cmd-section" style="display:none;margin-top:.9rem;">
      <div style="font-weight:bold;color:#a07aee;margin-bottom:.58rem;">👑 Elérhető Commanderek</div>
      <div class="filter-bar">
        <select id="cmd-faction-filter"><option value="">Minden frakció</option></select>
      </div>
      <div class="grid" id="avail-cmds"></div>
    </div>
  </div>
</div>

<!-- BATTLE PAGE -->
<div class="page" id="page-battle">
  <div class="wrap">
    <div class="card" style="padding:.8rem;margin-bottom:.8rem;">
      <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;">
        <span style="color:var(--gold);font-weight:bold;">⚔️ Csata Mód</span>
        <select id="battle-fleet-sel" style="padding:.32rem .55rem;background:var(--inp);border:1px solid var(--gdim);color:var(--txt);border-radius:4px;font-size:.83rem;"></select>
        <button class="btn bd bsm" id="btn-reset-battle">🔄 Reset HP</button>
        <span style="font-size:.72rem;color:var(--dim);margin-left:auto;">HP az oldal bezárásáig marad</span>
      </div>
      <div class="battle-filter" style="margin-top:.5rem;">
        <select id="battle-type-filter"><option value="">Minden típus</option></select>
        <select id="battle-faction-filter"><option value="">Minden frakció</option></select>
      </div>
    </div>
    <div id="battle-cards"></div>
  </div>
</div>

<!-- SHIP MODAL -->
<div class="modal-bg" id="ship-modal">
  <div class="modal" style="max-width:560px;">
    <div class="mhdr"><h2 id="m-ship-name"></h2><button class="mx" id="m-ship-close">×</button></div>
    <div class="mbody">
      <img id="m-ship-img" style="width:100%;border-radius:4px;margin-bottom:.75rem;display:none;">
      <div class="mtabs">
        <button class="mtab active" data-tab="stats">📊 Statisztikák</button>
        <button class="mtab" data-tab="weapons">🔫 Fegyverek</button>
        <button class="mtab" data-tab="wargear">⚙️ Wargear</button>
      </div>
      <div id="m-tab-stats"><div class="mstats" id="m-ship-stats"></div></div>
      <div id="m-tab-weapons" style="display:none;"><div id="m-ship-weapons"></div></div>
      <div id="m-tab-wargear" style="display:none;"><div id="m-ship-wargear"></div></div>
    </div>
  </div>
</div>

<!-- CMD MODAL -->
<div class="modal-bg" id="cmd-modal">
  <div class="modal purple">
    <div class="mhdr"><h2 class="purple" id="m-cmd-name"></h2><button class="mx" id="m-cmd-close">×</button></div>
    <div class="mbody"><div class="mstats" id="m-cmd-stats"></div></div>
  </div>
</div>

<!-- NEW FLEET MODAL -->
<div class="modal-bg" id="new-fleet-modal">
  <div class="modal sm">
    <div class="mhdr"><h2>⚓ Új Flotta</h2><button class="mx" id="m-fleet-close">×</button></div>
    <div class="mbody">
      <div class="fg"><label>Flotta neve</label><input type="text" id="new-fleet-name" placeholder="pl. Imperial Crusade"></div>
      <div class="fg"><label>Ponthatár</label><input type="number" id="new-fleet-pts" value="1500" min="0" step="100"></div>
      <button class="btn bg" style="width:100%;" id="btn-create-fleet">Létrehozás</button>
    </div>
  </div>
</div>

<script>
var ships=[], commanders=[], fleets=[], activeFleetId=null, battleState={};
var IS_LOCAL=location.protocol==='file:';
var CRITS=[
  {roll:2,dmg:'+0',name:'Dorsal Armament Damaged',desc:'A hátulsó fegyverzet megrongálódott. Nem tud tüzelni amíg meg nem javítják.'},
  {roll:3,dmg:'+0',name:'Starboard Armament Damaged',desc:'A jobb oldali fegyverzet meghibásodott. Nem tud tüzelni amíg meg nem javítják.'},
  {roll:4,dmg:'+0',name:'Port Armament Damaged',desc:'A bal oldali fegyverzet elnémult. Nem tud tüzelni amíg meg nem javítják.'},
  {roll:5,dmg:'+0',name:'Prow Armament Damaged',desc:'Az orr fegyverzete megsérült. Nem tud tüzelni amíg meg nem javítják.'},
  {roll:6,dmg:'+1',name:'Engine Room Damaged',desc:'A gépteret felrobbanások rázták meg. Nem tud fordulni amíg meg nem javítják.'},
  {roll:7,dmg:'+0',name:'Fire!',desc:'Tüzek keletkeztek. End Phase-ben oltsd el. Ha nem sikerül: +1 extra sebzés.'},
  {roll:8,dmg:'+1',name:'Thrusters Damaged',desc:'A hajtómű kikapcsolt. Sebesség −10 cm amíg meg nem javítják.'},
  {roll:9,dmg:'+0',name:'Bridge Smashed',desc:'A parancsnoki híd megsemmisült. Leadership −3. Nem javítható.'},
  {roll:10,dmg:'+0',name:'Shields Collapse',desc:'Pajzsgenerátorok kiégtek. Pajzserő nulla. Nem javítható.'},
  {roll:11,dmg:'+D3',name:'Hull Breach',desc:'Hatalmas rés a hajótestben, öldöklés a legénység között.'},
  {roll:12,dmg:'+D6',name:'Bulkhead Collapse',desc:'Belső tartóoszlopok roppannak össze. Imádkozz hogy maradjon valami!'}
];

function loadAll(){
  try{ships=JSON.parse(localStorage.getItem('bfg_ships')||'[]');}catch(e){ships=[];}
  try{commanders=JSON.parse(localStorage.getItem('bfg_commanders')||'[]');}catch(e){commanders=[];}
  try{fleets=JSON.parse(localStorage.getItem('bfg_fleets')||'[]');}catch(e){fleets=[];}
  if(!fleets.length) fleets=[{id:gid(),name:'1. Flotta',pointsLimit:1500,fleet:[],commanders:[]}];
  fleets.forEach(function(f){if(!f.commanders)f.commanders=[];f.fleet.forEach(function(e){if(!e.wargear)e.wargear={};if(!e.weapons)e.weapons={};if(!e.variantId)e.variantId=null;});});
  activeFleetId=localStorage.getItem('bfg_active')||fleets[0].id;
  if(!fleets.find(function(f){return f.id===activeFleetId;}))activeFleetId=fleets[0].id;
  try{battleState=JSON.parse(sessionStorage.getItem('bfg_battle')||'{}');}catch(e){battleState={};}
}
function saveFleets(){localStorage.setItem('bfg_fleets',JSON.stringify(fleets));localStorage.setItem('bfg_active',activeFleetId);}
function saveBattle(){sessionStorage.setItem('bfg_battle',JSON.stringify(battleState));}
function activeFleet(){return fleets.find(function(f){return f.id===activeFleetId;})||fleets[0];}

function gid(){return '_'+Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function get(id){return document.getElementById(id);}
function toast(msg,col){var el=get('toast');el.textContent=msg;el.style.borderColor=col||'var(--gold)';el.style.color=col||'var(--gold)';el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},3000);}
function openModal(id){get(id).classList.add('open');}
function closeModal(id){get(id).classList.remove('open');}

// ---- resolve ship data for an entry (base or variant) ----
function resolveShip(entry){
  var ship=ships.find(function(s){return s.id===entry.shipId;}); if(!ship) return null;
  if(entry.variantId&&ship.variants){
    var v=ship.variants.find(function(x){return x.id===entry.variantId;});
    if(v) return Object.assign({},ship,{name:ship.name+' ('+v.name+')',points:v.points||ship.points,hits:v.hits||ship.hits,stats:v.stats||ship.stats,weapons:v.weapons&&v.weapons.length?v.weapons:ship.weapons,wargear:v.wargear&&v.wargear.length?v.wargear:ship.wargear,_varName:v.name,_baseShip:ship});
  }
  return ship;
}

// ---- points ----
function shipEntryPts(entry){
  var ship=resolveShip(entry); if(!ship) return 0;
  var pts=ship.points;
  if(entry.wargear&&ship.wargear) Object.entries(entry.wargear).forEach(function(kv){var wg=ship.wargear.find(function(w){return w.id===kv[0];});if(wg) pts+=wg.pts*kv[1];});
  if(entry.weapons&&ship.weapons) Object.entries(entry.weapons).forEach(function(kv){var wp=ship.weapons.find(function(w){return w.id===kv[0];});if(wp&&wp.optional) pts+=(wp.pts||0)*kv[1];});
  return pts;
}
function fleetPts(f){
  var t=0;
  f.fleet.forEach(function(e){t+=shipEntryPts(e)*e.count;});
  f.commanders.forEach(function(cid){var c=commanders.find(function(x){return x.id===cid;});if(c)t+=c.points;});
  return t;
}
function updatePtsBar(){
  var f=activeFleet(),pts=fleetPts(f);
  var el=get('pts-used'); el.textContent=pts; el.className=pts>f.pointsLimit?'pnum over':'pnum';
  get('pts-limit').textContent=f.pointsLimit; get('pts-limit-inp').value=f.pointsLimit; get('fleet-name-inp').value=f.name;
  get('cmd-warn').classList.toggle('show',pts>750&&!f.commanders.length);
}
get('pts-limit-inp').addEventListener('change',function(){activeFleet().pointsLimit=parseInt(this.value)||0;saveFleets();updatePtsBar();renderTabs();});
get('fleet-name-inp').addEventListener('input',function(){activeFleet().name=this.value||'Névtelen';saveFleets();renderTabs();});

// ---- NAV ----
['fleet','battle'].forEach(function(p){
  get('nb-'+p).addEventListener('click',function(){
    ['fleet','battle'].forEach(function(x){get('nb-'+x).classList.remove('active');get('page-'+x).classList.remove('active');});
    get('nb-'+p).classList.add('active');get('page-'+p).classList.add('active');
    if(p==='battle') renderBattle();
  });
});

// ---- FLEET TABS ----
function renderTabs(){
  var el=get('ftabs');
  el.innerHTML=fleets.map(function(f){var pts=fleetPts(f),over=pts>f.pointsLimit;return '<button class="ftab'+(f.id===activeFleetId?' active':'')+'" data-id="'+f.id+'"><span>'+esc(f.name)+'</span><span class="tp'+(over?' over':'')+'">'+pts+'/'+f.pointsLimit+'</span><span class="td" data-del="'+f.id+'">✕</span></button>';}).join('');
  el.querySelectorAll('.ftab').forEach(function(tab){tab.addEventListener('click',function(e){if(e.target.dataset.del)return;activeFleetId=tab.dataset.id;saveFleets();renderTabs();renderFleet();updatePtsBar();});});
  el.querySelectorAll('[data-del]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();if(fleets.length<=1){toast('Legalább egy flotta kell!','var(--red)');return;}if(!confirm('Törlöd?'))return;fleets=fleets.filter(function(f){return f.id!==btn.dataset.del;});if(activeFleetId===btn.dataset.del)activeFleetId=fleets[0].id;saveFleets();renderTabs();renderFleet();updatePtsBar();});});
}
get('btn-add-fleet').addEventListener('click',function(){get('new-fleet-name').value='';get('new-fleet-pts').value='1500';openModal('new-fleet-modal');setTimeout(function(){get('new-fleet-name').focus();},80);});
get('m-fleet-close').addEventListener('click',function(){closeModal('new-fleet-modal');});
get('new-fleet-modal').addEventListener('click',function(e){if(e.target===get('new-fleet-modal'))closeModal('new-fleet-modal');});
get('btn-create-fleet').addEventListener('click',function(){var name=get('new-fleet-name').value.trim()||('Flotta '+(fleets.length+1));var limit=parseInt(get('new-fleet-pts').value)||1500;var id=gid();fleets.push({id:id,name:name,pointsLimit:limit,fleet:[],commanders:[]});activeFleetId=id;saveFleets();closeModal('new-fleet-modal');renderTabs();renderFleet();updatePtsBar();});

// ---- SHARE ----
function encodeFleet(f){
  var fl=f.fleet.map(function(e){var wg=Object.entries(e.wargear||{}).filter(function(kv){return kv[1]>0;}).map(function(kv){return kv[0]+'='+kv[1];}).join('+');var wp=Object.entries(e.weapons||{}).filter(function(kv){return kv[1]>0;}).map(function(kv){return kv[0]+'='+kv[1];}).join('+');var vid=e.variantId||'';return e.shipId+':'+e.count+':'+(wg||'0')+':'+(wp||'0')+':'+vid;}).join(',');
  var cm=(f.commanders||[]).join(',');
  return btoa(unescape(encodeURIComponent([f.name,f.pointsLimit,fl,cm].join('|'))));
}
function decodeFleet(code){
  try{
    var raw=decodeURIComponent(escape(atob(code.trim())));var parts=raw.split('|');
    var fleet=(parts[2]||'').split(',').filter(Boolean).map(function(seg){var sp=seg.split(':');var wg={};var wp={};if(sp[2]&&sp[2]!=='0')sp[2].split('+').forEach(function(p){var kv=p.split('=');if(kv[0])wg[kv[0]]=parseInt(kv[1])||1;});if(sp[3]&&sp[3]!=='0')sp[3].split('+').forEach(function(p){var kv=p.split('=');if(kv[0])wp[kv[0]]=parseInt(kv[1])||1;});return{shipId:sp[0],count:parseInt(sp[1])||1,wargear:wg,weapons:wp,variantId:sp[4]||null};});
    var cmds=(parts[3]||'').split(',').filter(Boolean);
    return{name:parts[0]||'Importált',pointsLimit:parseInt(parts[1])||1500,fleet:fleet,commanders:cmds};
  }catch(e){return null;}
}
get('btn-copy-code').addEventListener('click',function(){var code=encodeFleet(activeFleet());navigator.clipboard.writeText(code).then(function(){var el=get('copy-ok');el.style.display='inline';clearTimeout(el._t);el._t=setTimeout(function(){el.style.display='none';},2500);}).catch(function(){get('import-code').value=code;});});
get('btn-import-code').addEventListener('click',function(){var code=get('import-code').value.trim();var st=get('import-fleet-status');if(!code){st.textContent='⚠️ Írj be egy kódot!';return;}var dec=decodeFleet(code);if(!dec){st.textContent='❌ Hibás kód!';return;}var vf=dec.fleet.filter(function(e){return ships.find(function(s){return s.id===e.shipId;});});var vc=dec.commanders.filter(function(cid){return commanders.find(function(c){return c.id===cid;});});var miss=dec.fleet.length-vf.length;var id=gid();fleets.push({id:id,name:dec.name,pointsLimit:dec.pointsLimit,fleet:vf,commanders:vc});activeFleetId=id;saveFleets();get('import-code').value='';st.textContent=miss>0?'✅ Betöltve! ('+miss+' hajó hiányzik)':'✅ Betöltve!';renderTabs();renderFleet();updatePtsBar();});

// ---- EDIT MODE ----
get('edit-toggle').addEventListener('change',function(){var on=this.checked;get('fleet-container').classList.toggle('edit-on',on);get('cmd-container').classList.toggle('edit-on',on);get('avail-section').style.display=on?'block':'none';get('avail-cmd-section').style.display=on?'block':'none';if(on){renderAvailShips();renderAvailCmds();}renderFleet();});

// ---- MODALS ----
get('m-ship-close').addEventListener('click',function(){closeModal('ship-modal');});get('ship-modal').addEventListener('click',function(e){if(e.target===get('ship-modal'))closeModal('ship-modal');});
get('m-cmd-close').addEventListener('click',function(){closeModal('cmd-modal');});get('cmd-modal').addEventListener('click',function(e){if(e.target===get('cmd-modal'))closeModal('cmd-modal');});
get('ship-modal').querySelectorAll('.mtab').forEach(function(tab){tab.addEventListener('click',function(){get('ship-modal').querySelectorAll('.mtab').forEach(function(t){t.classList.remove('active');});tab.classList.add('active');var name=tab.dataset.tab;get('m-tab-stats').style.display=name==='stats'?'block':'none';get('m-tab-weapons').style.display=name==='weapons'?'block':'none';get('m-tab-wargear').style.display=name==='wargear'?'block':'none';});});

function buildWpnTable(weapons){
  if(!weapons||!weapons.length) return '<p style="color:var(--dim);font-size:.82rem;">Nincs fegyver adat.</p>';
  return '<table style="width:100%;border-collapse:collapse;font-size:.8rem;"><thead><tr style="background:#0d0d15;">'
    +'<th style="padding:.3rem .5rem;text-align:left;color:var(--gold);font-size:.69rem;text-transform:uppercase;border-bottom:2px solid var(--gdim);">Armament</th>'
    +'<th style="padding:.3rem .5rem;text-align:center;color:var(--gold);font-size:.69rem;text-transform:uppercase;border-bottom:2px solid var(--gdim);">Range</th>'
    +'<th style="padding:.3rem .5rem;text-align:center;color:var(--gold);font-size:.69rem;text-transform:uppercase;border-bottom:2px solid var(--gdim);">FP/Str</th>'
    +'<th style="padding:.3rem .5rem;text-align:center;color:var(--gold);font-size:.69rem;text-transform:uppercase;border-bottom:2px solid var(--gdim);">Arc</th>'
    +'<th style="padding:.3rem .5rem;text-align:left;color:var(--gold);font-size:.69rem;text-transform:uppercase;border-bottom:2px solid var(--gdim);">Loc</th>'
    +'</tr></thead><tbody>'
    +weapons.map(function(w,i){var locs=(w.locations||[]).join(', ');var optBadge=w.optional?'<span style="background:var(--orange);color:#0a0a0f;padding:.07rem .25rem;border-radius:2px;font-size:.63rem;font-weight:bold;margin-left:.25rem;">+'+( w.pts||0)+'pts</span>':'';return '<tr style="'+(i%2===1?'background:#0d0d16;':'')+'"><td style="padding:.3rem .5rem;font-weight:bold;color:var(--gold);">'+esc(w.name||'')+optBadge+'</td><td style="padding:.3rem .5rem;text-align:center;">'+esc(w.range||'—')+'</td><td style="padding:.3rem .5rem;text-align:center;">'+esc(w.fp||'—')+'</td><td style="padding:.3rem .5rem;text-align:center;">'+esc(w.arc||'—')+'</td><td style="padding:.3rem .5rem;color:var(--dim);font-size:.75rem;">'+esc(locs||'—')+'</td></tr>';}).join('')
    +'</tbody></table>';
}

function showShipModal(ship){
  document.getElementById('m-ship-name').textContent=ship.name;
  var img=get('m-ship-img');img.src=ship.image||'';img.style.display=ship.image?'block':'none';
  var baseShip=ship._baseShip||ship;
  var statsText='Frakció: '+baseShip.faction+(baseShip.subfaction?' ('+baseShip.subfaction+')':'')+'\nTípus: '+(baseShip.type||'—')+'\nPontérték: '+ship.points+' pts\nHP: '+(ship.hits||8)+'\n\n'+(ship.stats||'Nincs statisztika');
  get('m-ship-stats').textContent=statsText;
  get('m-ship-weapons').innerHTML=buildWpnTable(ship.weapons);
  var gEl=get('m-ship-wargear');
  gEl.innerHTML=ship.wargear&&ship.wargear.length?ship.wargear.map(function(wg){return '<div style="background:var(--inp);border-radius:4px;padding:.45rem .65rem;margin-bottom:.28rem;font-size:.8rem;"><div style="font-weight:bold;color:var(--gold);">'+esc(wg.name)+' <span style="color:var(--dim);font-size:.73rem;">+'+wg.pts+' pts · max '+(wg.max||1)+'×</span></div>'+(wg.desc?'<div style="color:var(--dim);font-size:.76rem;margin-top:.1rem;">'+esc(wg.desc)+'</div>':'')+'</div>';}).join(''):'<p style="color:var(--dim);font-size:.82rem;">Nincs wargear.</p>';
  get('ship-modal').querySelectorAll('.mtab').forEach(function(t,i){t.classList.toggle('active',i===0);});
  get('m-tab-stats').style.display='block';get('m-tab-weapons').style.display='none';get('m-tab-wargear').style.display='none';
  openModal('ship-modal');
}
function showCmdModal(cmd){get('m-cmd-name').textContent=cmd.name;get('m-cmd-stats').textContent='Pontérték: '+cmd.points+' pts'+(cmd.faction?'\nFrakció: '+cmd.faction:'')+(cmd.type?'\nTípus: '+cmd.type:'')+'\n\n'+(cmd.desc||'Nincs leírás');openModal('cmd-modal');}

// ---- FLEET RENDER ----
function renderFleet(){
  var f=activeFleet(),el=get('fleet-ships');
  if(!f.fleet.length){el.innerHTML='<div class="empty"><div class="empty-icon">🚀</div><p>Kapcsold be a szerkesztő módot!</p></div>';get('fleet-count').textContent='0 hajó';updatePtsBar();return;}
  var total=0,html='';
  f.fleet.forEach(function(entry,idx){
    var ship=resolveShip(entry); if(!ship) return;
    var baseShip=ship._baseShip||ship;
    total+=entry.count;
    var wgExtra=0,wpExtra=0,extrasHtml='';
    // optional weapons
    if(ship.weapons&&ship.weapons.length){
      var optWpns=ship.weapons.filter(function(w){return w.optional;});
      if(optWpns.length){
        extrasHtml+=optWpns.map(function(wp){var qty=(entry.weapons||{})[wp.id]||0;wpExtra+=(wp.pts||0)*qty;var locs=(wp.locations||[]).join('/');return '<div class="wg-row"><button class="wqb" data-idx="'+idx+'" data-wpn="'+wp.id+'" data-dir="-1" data-max="'+(wp.max||1)+'">−</button><span class="wqn">'+qty+'</span><button class="wqb" data-idx="'+idx+'" data-wpn="'+wp.id+'" data-dir="1" data-max="'+(wp.max||1)+'">+</button><span class="wg-lbl">🔫 '+esc(wp.name)+(locs?' <span style="font-size:.68rem;color:var(--dim);">('+esc(locs)+')</span>':'')+'</span><span class="wg-pts-lbl">+'+(wp.pts||0)+'pts</span></div>';}).join('');
      }
    }
    // wargear
    if(ship.wargear&&ship.wargear.length){
      extrasHtml+=ship.wargear.map(function(wg){var qty=(entry.wargear||{})[wg.id]||0;wgExtra+=wg.pts*qty;return '<div class="wg-row"><button class="wqb" data-idx="'+idx+'" data-wg="'+wg.id+'" data-dir="-1" data-max="'+(wg.max||1)+'">−</button><span class="wqn">'+qty+'</span><button class="wqb" data-idx="'+idx+'" data-wg="'+wg.id+'" data-dir="1" data-max="'+(wg.max||1)+'">+</button><span class="wg-lbl">⚙️ '+esc(wg.name)+'</span><span class="wg-pts-lbl">+'+wg.pts+'pts</span></div>';}).join('');
    }
    if(extrasHtml) extrasHtml='<div>'+extrasHtml+'</div>';
    var tpts=ship.points+wgExtra+wpExtra;
    var breakdown='<div class="fe-breakdown">Hajó: '+ship.points+' pts'+(wpExtra>0?' · Fegyver: +'+wpExtra+' pts':'')+(wgExtra>0?' · Wargear: +'+wgExtra+' pts':'')+'</div>';
    // variant selector
    var varHtml='';
    if(baseShip.variants&&baseShip.variants.length){
      varHtml='<div class="var-select-row"><label>Variáció:</label><select class="var-sel" data-idx="'+idx+'"><option value="">— Alap —</option>'+baseShip.variants.map(function(v){return '<option value="'+v.id+'"'+(entry.variantId===v.id?' selected':'')+'>'+esc(v.name)+'</option>';}).join('')+'</select>'+(entry.variantId?'<span class="var-badge">🔀 '+esc(ship._varName)+'</span>':'')+'</div>';
    }
    for(var i=0;i<entry.count;i++){
      html+='<div class="fe">'+(ship.image?'<img class="fe-thumb" src="'+esc(ship.image)+'" alt="">':'')
        +'<div class="fe-info" data-sid="'+baseShip.id+'"><div class="fe-name">'+esc(ship.name)+'</div><div class="fe-pts">'+tpts+' pts</div>'+breakdown+varHtml+extrasHtml+'</div>'
        +'<div class="fe-right"><button class="rm-btn" data-idx="'+idx+'">×</button></div></div>';
    }
  });
  el.innerHTML=html;get('fleet-count').textContent=total+' hajó';
  el.querySelectorAll('.fe-info').forEach(function(d){d.addEventListener('click',function(e){if(e.target.tagName==='SELECT'||e.target.tagName==='BUTTON'||e.target.tagName==='OPTION')return;var ship=resolveShip(activeFleet().fleet.find(function(x){return x.shipId===d.dataset.sid;})||{shipId:d.dataset.sid,variantId:null,wargear:{},weapons:{}});if(ship)showShipModal(ship);});});
  el.querySelectorAll('.rm-btn').forEach(function(btn){btn.addEventListener('click',function(){var f=activeFleet(),i=parseInt(btn.dataset.idx);if(f.fleet[i].count>1)f.fleet[i].count--;else f.fleet.splice(i,1);saveFleets();renderFleet();renderTabs();updatePtsBar();});});
  el.querySelectorAll('.var-sel').forEach(function(sel){sel.addEventListener('change',function(){var f=activeFleet(),idx=parseInt(sel.dataset.idx);f.fleet[idx].variantId=sel.value||null;f.fleet[idx].wargear={};f.fleet[idx].weapons={};saveFleets();renderFleet();renderTabs();updatePtsBar();});});
  el.querySelectorAll('.wqb').forEach(function(btn){btn.addEventListener('click',function(){var f=activeFleet(),idx=parseInt(btn.dataset.idx),dir=parseInt(btn.dataset.dir),maxQ=parseInt(btn.dataset.max||1);if(btn.dataset.wg){if(!f.fleet[idx].wargear)f.fleet[idx].wargear={};var cur=f.fleet[idx].wargear[btn.dataset.wg]||0;var nv=Math.max(0,Math.min(maxQ,cur+dir));if(nv===0)delete f.fleet[idx].wargear[btn.dataset.wg];else f.fleet[idx].wargear[btn.dataset.wg]=nv;}else if(btn.dataset.wpn){if(!f.fleet[idx].weapons)f.fleet[idx].weapons={};var cur2=f.fleet[idx].weapons[btn.dataset.wpn]||0;var nv2=Math.max(0,Math.min(maxQ,cur2+dir));if(nv2===0)delete f.fleet[idx].weapons[btn.dataset.wpn];else f.fleet[idx].weapons[btn.dataset.wpn]=nv2;}saveFleets();renderFleet();renderTabs();updatePtsBar();});});
  updatePtsBar();
}

// commander fleet
function renderFleetCmds(){
  var f=activeFleet(),cel=get('fleet-cmds');
  if(!f.commanders.length){cel.innerHTML='<div class="empty"><div class="empty-icon">👑</div><p>Nincs commander.</p></div>';get('cmd-count').textContent='0 commander';return;}
  cel.innerHTML=f.commanders.map(function(cid,i){var c=commanders.find(function(x){return x.id===cid;});if(!c)return '';return '<div class="fe"><div class="fe-info" data-cid="'+c.id+'"><div class="fe-name" style="color:#a07aee;">👑 '+esc(c.name)+'</div><div class="fe-pts purple">'+c.points+' pts</div>'+(c.faction?'<div class="fe-breakdown">'+esc(c.faction)+(c.type?' · '+esc(c.type):'')+'</div>':'')+'</div><div class="fe-right"><button class="rm-btn" data-ci="'+i+'">×</button></div></div>';}).join('');
  get('cmd-count').textContent=f.commanders.length+' commander';
  cel.querySelectorAll('.fe-info').forEach(function(d){d.addEventListener('click',function(){var c=commanders.find(function(x){return x.id===d.dataset.cid;});if(c)showCmdModal(c);});});
  cel.querySelectorAll('.rm-btn').forEach(function(btn){btn.addEventListener('click',function(){var f=activeFleet();f.commanders.splice(parseInt(btn.dataset.ci),1);saveFleets();renderFleetCmds();renderTabs();updatePtsBar();});});
}

// combined fleet render
var _origRenderFleet=renderFleet;
renderFleet=function(){_origRenderFleet();renderFleetCmds();};

// ---- AVAILABLE SHIPS ----
function getUniq(arr,key){var r=[];arr.forEach(function(x){var v=x[key]||'';if(v&&r.indexOf(v)<0)r.push(v);});return r.sort();}
function fillSel(id,vals,cur){var el=get(id);var first=el.options[0].text;el.innerHTML='<option value="">'+first+'</option>'+vals.map(function(v){return '<option value="'+esc(v)+'"'+(v===cur?' selected':'')+'>'+esc(v)+'</option>';}).join('');el.value=cur||'';}

function renderAvailShips(){
  var ff=get('faction-filter').value,fsf=get('subfaction-filter').value,ft=get('type-filter').value,sf=get('search-filter').value.toLowerCase();
  fillSel('faction-filter',getUniq(ships,'faction'),ff);
  fillSel('subfaction-filter',getUniq(ships,'subfaction'),fsf);
  fillSel('type-filter',getUniq(ships,'type'),ft);
  var list=ships.filter(function(s){return(!ff||s.faction===ff)&&(!fsf||s.subfaction===fsf)&&(!ft||s.type===ft)&&(!sf||s.name.toLowerCase().indexOf(sf)>=0);});
  var el=get('avail-ships');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>Nincs hajó.</p></div>';return;}
  el.innerHTML=list.map(function(s){
    var tags='';
    if(s.type)tags+='<span style="background:#1a2a1a;color:var(--green);padding:.08rem .28rem;border-radius:3px;font-size:.66rem;margin-right:.2rem;">'+esc(s.type)+'</span>';
    if(s.subfaction)tags+='<span style="background:#1a1a2a;color:#7a9aee;padding:.08rem .28rem;border-radius:3px;font-size:.66rem;">'+esc(s.subfaction)+'</span>';
    var varBadge=s.variants&&s.variants.length?'<div style="font-size:.7rem;color:#4ad9c9;margin-top:.15rem;">🔀 '+s.variants.length+' variáció</div>':'';
    return '<div class="sc">'+(s.image?'<img src="'+esc(s.image)+'" alt="">':'<div class="sc-img"></div>')
      +'<div class="sc-body"><div class="sc-hdr"><span class="sc-name" data-sid="'+s.id+'">'+esc(s.name)+'</span><span class="badge bg-b">'+s.points+' pts</span></div>'
      +(tags?'<div style="margin-bottom:.2rem;">'+tags+'</div>':'')
      +'<div class="sc-sub">'+esc(s.faction||'')+'</div>'
      +(s.wargear&&s.wargear.length?'<div style="font-size:.7rem;color:var(--dim);">⚙️ '+s.wargear.length+' wargear</div>':'')
      +varBadge
      +'<div class="sc-acts"><button class="btn bg add-ship-btn" data-sid="'+s.id+'">+ Flottához</button></div>'
      +'</div></div>';
  }).join('');
  el.querySelectorAll('.sc-name').forEach(function(n){n.addEventListener('click',function(){var ship=ships.find(function(s){return s.id===n.dataset.sid;});if(ship)showShipModal(ship);});});
  el.querySelectorAll('.add-ship-btn').forEach(function(btn){btn.addEventListener('click',function(){var f=activeFleet(),ex=f.fleet.find(function(e){return e.shipId===btn.dataset.sid&&!e.variantId;});if(ex)ex.count++;else f.fleet.push({shipId:btn.dataset.sid,count:1,wargear:{},weapons:{},variantId:null});saveFleets();renderFleet();renderTabs();updatePtsBar();});});
}
get('faction-filter').addEventListener('change',renderAvailShips);
get('subfaction-filter').addEventListener('change',renderAvailShips);
get('type-filter').addEventListener('change',renderAvailShips);
get('search-filter').addEventListener('input',renderAvailShips);

function renderAvailCmds(){
  var ff=get('cmd-faction-filter').value;
  fillSel('cmd-faction-filter',getUniq(commanders,'faction'),ff);
  var list=ff?commanders.filter(function(c){return c.faction===ff;}):commanders;
  var el=get('avail-cmds');
  if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">👑</div><p>Nincs commander.</p></div>';return;}
  el.innerHTML=list.map(function(c){return '<div class="sc purple"><div class="sc-body"><div class="sc-hdr"><span class="sc-name purple" data-cid="'+c.id+'">'+esc(c.name)+'</span><span class="badge bp-b">'+c.points+' pts</span></div>'+(c.faction?'<div class="sc-sub">'+esc(c.faction)+(c.type?' · '+esc(c.type):'')+'</div>':'')+(c.desc?'<div class="sc-sub">'+esc(c.desc.substr(0,60))+(c.desc.length>60?'…':'')+'</div>':'')+'<div class="sc-acts"><button class="btn bp add-cmd-btn" data-cid="'+c.id+'">+ Flottához</button></div></div></div>';}).join('');
  el.querySelectorAll('.sc-name').forEach(function(n){n.addEventListener('click',function(){var c=commanders.find(function(x){return x.id===n.dataset.cid;});if(c)showCmdModal(c);});});
  el.querySelectorAll('.add-cmd-btn').forEach(function(btn){btn.addEventListener('click',function(){activeFleet().commanders.push(btn.dataset.cid);saveFleets();renderFleetCmds();renderTabs();updatePtsBar();});});
}
get('cmd-faction-filter').addEventListener('change',renderAvailCmds);

// ============================================================
// BATTLE MODE
// ============================================================
get('battle-fleet-sel').addEventListener('change',function(){activeFleetId=this.value;saveFleets();renderBattle();});
get('btn-reset-battle').addEventListener('click',function(){if(!confirm('Reset az összes HP-t?'))return;var f=activeFleet();Object.keys(battleState).forEach(function(k){if(k.indexOf(activeFleetId)===0||k.indexOf('cmd_'+activeFleetId)===0)delete battleState[k];});saveBattle();renderBattle();});

function getMaxHp(ship){if(ship.hits)return parseInt(ship.hits);var m=(ship.stats||'').match(/hits\s*:\s*(\d+)/i);return m?parseInt(m[1]):8;}

function renderBattle(){
  var sel=get('battle-fleet-sel');sel.innerHTML=fleets.map(function(f){return '<option value="'+f.id+'"'+(f.id===activeFleetId?' selected':'')+'>'+esc(f.name)+'</option>';}).join('');
  var f=activeFleet(),el=get('battle-cards');
  var btf=get('battle-type-filter').value,bff=get('battle-faction-filter').value;

  // populate battle filters
  var allShips=[];f.fleet.forEach(function(e){var s=resolveShip(e);if(s)allShips.push(s._baseShip||s);});
  fillSel('battle-type-filter',getUniq(allShips,'type'),btf);
  fillSel('battle-faction-filter',getUniq(allShips,'faction'),bff);

  if(!f.fleet.length&&!f.commanders.length){el.innerHTML='<div class="empty"><div class="empty-icon">⚔️</div><p>Nincs hajó. Adj hozzá a Fleet Builder-ben!</p></div>';return;}
  var html='';
  f.fleet.forEach(function(entry,idx){
    var ship=resolveShip(entry); if(!ship) return;
    var baseShip=ship._baseShip||ship;
    if(btf&&baseShip.type!==btf)return;
    if(bff&&baseShip.faction!==bff)return;
    // Each copy of the same entry gets its own battle key
    for(var copy=0;copy<entry.count;copy++){
      var key=activeFleetId+'_'+idx+'_'+copy;
      if(!battleState[key]){var mhp=getMaxHp(ship);battleState[key]={hp:mhp,maxHp:mhp,crits:{},open:false};}
      var st=battleState[key];
      var pct=Math.max(0,Math.min(100,(st.hp/st.maxHp)*100));var cls=pct<=25?'crit':pct<=50?'low':'';
      var shipLabel=esc(ship.name)+(entry.count>1?' #'+(copy+1):'');
      html+='<div class="bc'+(st.hp<=0?' destroyed':'')+'"><div class="bc-head'+(st.open?' open':'')+'" data-key="'+key+'">'
        +(ship.image?'<img class="bc-img" src="'+esc(ship.image)+'" alt="">':'<div class="bc-img" style="background:var(--inp);border-radius:4px;"></div>')
        +'<div class="bc-info"><div class="bc-name">'+shipLabel+(st.hp<=0?' <span style="color:var(--red);font-size:.76rem;">💀</span>':'')+'</div><div class="bc-sub">'+esc(baseShip.faction||'')+(baseShip.type?' · '+esc(baseShip.type):'')+' · '+st.hp+'/'+st.maxHp+' HP</div></div>'
        +'<div style="color:var(--dim);font-size:.8rem;padding-left:.5rem;">'+(st.open?'▲':'▼')+'</div></div>'
        +'<div class="bc-body'+(st.open?' open':'')+'">'+buildHpSection(key,st,pct,cls)+buildCritTable(key,st.crits||{})+buildWeaponsSec(ship)+'</div></div>';
    }
  });
  f.commanders.forEach(function(cid,idx){var c=commanders.find(function(x){return x.id===cid;});if(!c)return;var key='cmd_'+activeFleetId+'_'+idx;if(!battleState[key])battleState[key]={open:false};var st=battleState[key];html+='<div class="bc" style="border-color:var(--pdim);"><div class="bc-head'+(st.open?' open':'')+'" data-key="'+key+'"><div class="bc-info"><div class="bc-name" style="color:#a07aee;">👑 '+esc(c.name)+'</div><div class="bc-sub">'+c.points+' pts'+(c.faction?' · '+esc(c.faction):'')+'</div></div><div style="color:var(--dim);font-size:.8rem;padding-left:.5rem;">'+(st.open?'▲':'▼')+'</div></div><div class="bc-body'+(st.open?' open':'')+'"><p style="color:var(--dim);font-size:.83rem;">'+esc(c.desc||'Nincs leírás')+'</p></div></div>';});
  el.innerHTML=html;
  // bind events
  el.querySelectorAll('.bc-head').forEach(function(head){head.addEventListener('click',function(){var key=head.dataset.key;if(battleState[key]){battleState[key].open=!battleState[key].open;saveBattle();renderBattle();}});});
  el.querySelectorAll('.hp-adj').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var key=btn.dataset.key,d=parseInt(btn.dataset.d),st=battleState[key];if(!st)return;st.hp=Math.max(0,Math.min(st.maxHp,st.hp+d));saveBattle();renderBattle();});});
  el.querySelectorAll('.hp-set-btn').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var key=btn.dataset.key,inp=el.querySelector('.hp-set-inp[data-key="'+key+'"]'),st=battleState[key];if(!st||!inp)return;st.hp=Math.max(0,Math.min(st.maxHp,parseInt(inp.value)||0));saveBattle();renderBattle();});});
  el.querySelectorAll('.hp-set-inp').forEach(function(inp){inp.addEventListener('click',function(e){e.stopPropagation();});});
  el.querySelectorAll('.ccb').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var key=btn.dataset.key,roll=parseInt(btn.dataset.roll),dir=parseInt(btn.dataset.dir),st=battleState[key];if(!st)return;if(!st.crits)st.crits={};st.crits[roll]=Math.max(0,(st.crits[roll]||0)+dir);saveBattle();renderBattle();});});
}
get('battle-type-filter').addEventListener('change',renderBattle);
get('battle-faction-filter').addEventListener('change',renderBattle);

function buildHpSection(key,st,pct,cls){return '<div style="margin-bottom:.9rem;"><div class="hp-row"><span style="color:var(--dim);">Hull Points</span><span class="hp-val '+cls+'">'+st.hp+' / '+st.maxHp+'</span></div><div class="hp-track"><div class="hp-fill '+cls+'" style="width:'+pct+'%"></div></div><div class="hp-ctrl"><button class="btn bd bsm hp-adj" data-key="'+key+'" data-d="-1">−1 Sérülés</button><button class="btn bgr bsm hp-adj" data-key="'+key+'" data-d="1">+1 Javítás</button><input type="number" class="hp-set-inp" data-key="'+key+'" value="'+st.hp+'" min="0" max="'+st.maxHp+'"><button class="btn bgh bsm hp-set-btn" data-key="'+key+'">Beállít</button></div></div>';}
function buildCritTable(key,crits){var rows=CRITS.map(function(c){var n=crits[c.roll]||0;var fires='';for(var i=0;i<n;i++)fires+='<span class="fire">🔥</span>';return '<tr><td class="cr">'+c.roll+'</td><td class="cd">'+c.dmg+'</td><td><div class="cc"><button class="ccb" data-key="'+key+'" data-roll="'+c.roll+'" data-dir="-1">−</button><span class="ccn">'+n+'</span><button class="ccb" data-key="'+key+'" data-roll="'+c.roll+'" data-dir="1">+</button></div></td><td><span class="crit-nm">'+esc(c.name)+'</span></td><td><div class="fires">'+fires+'</div></td></tr>';}).join('');return '<div style="margin-bottom:.9rem;"><div style="color:var(--gold);font-size:.87rem;font-weight:bold;margin-bottom:.45rem;">💥 Kritikus Találatok</div><table class="crit-tbl"><thead><tr><th>2D6</th><th>+Dmg</th><th>Db</th><th>Eredmény</th><th>🔥</th></tr></thead><tbody>'+rows+'</tbody></table></div>';}
function buildWeaponsSec(ship){if(!ship.weapons||!ship.weapons.length)return '';return '<div style="margin-top:.5rem;"><div style="color:var(--gold);font-size:.87rem;font-weight:bold;margin-bottom:.45rem;">🔫 Fegyverek</div>'+buildWpnTable(ship.weapons)+'</div>';}

// ============================================================
// INIT
// ============================================================
loadAll();renderTabs();renderFleet();updatePtsBar();
</script>
</body>
</html>
